<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elliptic · Demo Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #080d12;
    --bg-2:      #05080b;
    --card:      rgba(255,255,255,0.035);
    --card-hi:   rgba(255,255,255,0.06);
    --border:    rgba(255,255,255,0.08);
    --border-hi: rgba(255,255,255,0.16);
    --ink:       #eef2f5;
    --ink-soft:  #9aa7b1;
    --muted:     #5d6b76;
    --accent:    #2DE6C8;
    --bar-h:     56px;
    --radius:    8px;
    --sans: "Hanken Grotesk", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(46vw 40vw at 4% -4%, rgba(45,230,200,0.07), transparent 58%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: block; width: 100%; height: 100%; }

  .portal { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 0 30px 90px; }
  header.masthead { padding: 76px 0 6px; }
  h1.title { font-weight: 700; font-size: clamp(30px, 4.5vw, 44px); line-height: 1.05; letter-spacing: -0.02em; margin: 0; }
  .lede { margin: 14px 0 0; font-size: 15px; color: var(--ink-soft); line-height: 1.5; }

  /* ---------- Search ---------- */
  .search { position: relative; margin-top: 34px; max-width: 380px; }
  .search svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
  .search input {
    width: 100%; padding: 12px 16px 12px 42px;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--ink); font-family: var(--sans); font-size: 15px; outline: none;
    transition: border-color .16s, background .16s;
  }
  .search input::placeholder { color: var(--muted); }
  .search input:focus { border-color: var(--border-hi); background: var(--card-hi); }

  /* ---------- Section labels ---------- */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 40px 0 14px;
  }

  /* ---------- Divider ---------- */
  .divider { height: 1px; background: var(--border); margin: 44px 0 0; }

  /* ---------- Grid ---------- */
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }

  /* ---------- Cards (shared) ---------- */
  .card {
    position: relative; display: flex; align-items: center; gap: 15px; text-align: left;
    cursor: pointer; padding: 18px 20px;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    color: inherit; font: inherit; text-decoration: none;
    transition: border-color .16s ease, background .16s ease;
  }
  .card::after {
    content: ""; position: absolute; inset: -1px; border-radius: var(--radius);
    border: 1px solid rgba(45,230,200,0.5);
    box-shadow: 0 0 16px 1px rgba(45,230,200,0.28), inset 0 0 10px rgba(45,230,200,0.09);
    opacity: 0; pointer-events: none;
    animation: breathe var(--dur, 6s) ease-in-out var(--delay, 0s) infinite;
  }
  @keyframes breathe { 0%, 100% { opacity: 0; } 50% { opacity: 0.42; } }
  @media (prefers-reduced-motion: reduce) { .card::after { animation: none; opacity: 0; } }
  .card:hover { border-color: var(--border-hi); background: var(--card-hi); }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card .ico { position: relative; flex: 0 0 auto; width: 24px; height: 24px; color: var(--ink-soft); }
  .card .ico svg { width: 24px; height: 24px; display: block; }
  .card .name { position: relative; font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }

  /* ---------- File cards (slightly dimmer, no breathing — they're links not apps) ---------- */
  .file-card .ico { color: var(--muted); }
  .file-card .name { color: var(--ink-soft); font-weight: 500; }
  .file-card::after { display: none; }
  .file-card:hover { border-color: var(--border-hi); background: var(--card-hi); }

  .empty { grid-column: 1 / -1; text-align: center; padding: 70px 20px; color: var(--muted); font-size: 15px; }

  footer.foot {
    margin-top: 50px; padding-top: 20px; border-top: 1px solid var(--border);
    font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em;
  }

  /* ---------- Viewer ---------- */
  .viewer { position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column; background: var(--bg); }
  .viewer.open { display: flex; }
  .viewer-bar {
    height: var(--bar-h); flex: 0 0 var(--bar-h); display: flex; align-items: center; gap: 16px; padding: 0 16px;
    background: rgba(8,13,18,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px 9px 12px; border-radius: var(--radius);
    background: var(--card); border: 1px solid var(--border); color: var(--ink);
    font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .16s, color .16s, border-color .16s;
  }
  .back-btn:hover { background: var(--accent); color: #04130d; border-color: var(--accent); }
  .back-btn svg { width: 16px; height: 16px; }
  .viewer-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .viewer-frame { flex: 1; width: 100%; border: 0; background: #fff; }

  @media (max-width: 560px) { header.masthead { padding-top: 52px; } }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <canvas id="stars"></canvas>

  <main class="portal" id="portal">
    <header class="masthead">
      <h1 class="title">Demo Library</h1>
      <p class="lede">Click one to open. Use the back arrow to return here.</p>
    </header>

    <div class="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="search" type="search" placeholder="Search…" autocomplete="off" />
    </div>

    <!-- Demo Apps section -->
    <div class="section-label">Demo Apps</div>
    <section class="grid" id="grid" aria-label="Demo applications"></section>

    <!-- Files section -->
    <div class="divider"></div>
    <div class="section-label">Files</div>
    <div class="grid" id="files-grid">
      <!-- File 1 -->
      <a class="card file-card" id="file-1" href="https://docs.google.com/spreadsheets/d/1_dQUMtMaXfawuY_MbxjpGGbY4VFe57t2vcr7QNdfwR8/edit?gid=0#gid=0" target="_blank" rel="noopener"
        style="--dur:7s;--delay:-3s;">
        <span class="ico">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M6 3h8l4 4v14H6V3Z"/><path d="M14 3v4h4"/>
          </svg>
        </span>
        <span class="name">POC Framework</span>
      </a>
      <!-- File 2 -->
      <a class="card file-card" id="file-2" href="https://docs.google.com/spreadsheets/d/1IyioQ5gaWXD-e9b4VL1veP-rH3ZcoEqK3HZroKVbF1k/edit?gid=976869178#gid=976869178" target="_blank" rel="noopener"
        style="--dur:8s;--delay:-6s;">
        <span class="ico">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M6 3h8l4 4v14H6V3Z"/><path d="M14 3v4h4"/>
          </svg>
        </span>
        <span class="name">Node Due Diligence</span>
      </a>
    </div>

    <footer class="foot">Elliptic · Internal demo index</footer>
  </main>

  <!-- Viewer -->
  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer-bar">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <span class="viewer-title" id="viewerTitle"></span>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" title="Demo application"></iframe>
  </div>

<script>
const APPS = [
  { id:"general-integration",    title:"General Integration",         icon:"graph"  },
  { id:"btc-lightning-dd",       title:"BTC Lightning Due Diligence",  icon:"bolt"   },
  { id:"fraud-consolidation",    title:"Fraud Consolidation",          icon:"shield" },
  { id:"mt-demo",                title:"MT Demo",                      icon:"coin"   },
  { id:"reputational-dd",        title:"Reputational Due Diligence",   icon:"search" },
  { id:"engineer-escalation",    title:"Engineer Escalation",          icon:"chart"  }
];

const S = 'stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"';
const ICONS = {
  shield: '<svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6l7-3Z" '+S+'/></svg>',
  graph:  '<svg viewBox="0 0 24 24"><circle cx="5" cy="7" r="2" '+S+'/><circle cx="18" cy="6" r="2" '+S+'/><circle cx="16" cy="18" r="2" '+S+'/><path d="M7 8l9-1M7.5 8.6l7 8" '+S+'/></svg>',
  chart:  '<svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16" '+S+'/><path d="M8 15l3-4 3 2 4-6" '+S+'/></svg>',
  globe:  '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5" '+S+'/><path d="M3.5 12h17M12 3.5c2.5 2.4 2.5 14.6 0 17M12 3.5c-2.5 2.4-2.5 14.6 0 17" '+S+'/></svg>',
  search: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5" '+S+'/><path d="M20 20l-4.5-4.5" '+S+'/></svg>',
  bolt:   '<svg viewBox="0 0 24 24"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" '+S+'/></svg>',
  doc:    '<svg viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6V3Z" '+S+'/><path d="M14 3v4h4" '+S+'/></svg>',
  coin:   '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5" '+S+'/><path d="M12 7v1.5M12 15.5V17M9.5 9.5c0-1.1.9-2 2.5-2s2.5.9 2.5 2-1 1.8-2.5 2-2.5 1-2.5 2.2c0 1.1 1 2.3 2.5 2.3s2.5-.9 2.5-2" '+S+'/></svg>'
};

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list) {
  grid.innerHTML = "";
  if (!list.length) { grid.innerHTML = '<div class="empty">No demos match your search.</div>'; return; }
  list.forEach((app) => {
    const card = document.createElement("button");
    card.className = "card";
    card.setAttribute("aria-label", "Open " + app.title);
    const dur = (5 + Math.random() * 5).toFixed(2);
    const delay = (-Math.random() * 10).toFixed(2);
    card.style.setProperty("--dur", dur + "s");
    card.style.setProperty("--delay", delay + "s");
    card.innerHTML =
      '<span class="ico">' + (ICONS[app.icon] || ICONS["doc"]) + '</span>' +
      '<span class="name">' + app.title + '</span>';
    card.addEventListener("click", () => { location.hash = "#/" + app.id; });
    grid.appendChild(card);
  });
}
function applyFilter() {
  const q = search.value.trim().toLowerCase();
  render(!q ? APPS : APPS.filter(a => a.title.toLowerCase().includes(q)));
}
search.addEventListener("input", applyFilter);

const portal = document.getElementById("portal");
const viewer = document.getElementById("viewer");
const frame  = document.getElementById("viewerFrame");
const vTitle = document.getElementById("viewerTitle");

function openApp(app) {
  frame.src = "apps/" + app.id + "/index.html"; vTitle.textContent = app.title;
  viewer.classList.add("open"); viewer.setAttribute("aria-hidden","false");
  portal.style.display = "none"; document.title = "Elliptic · " + app.title;
}
function closeApp() {
  viewer.classList.remove("open"); viewer.setAttribute("aria-hidden","true");
  frame.src = "about:blank"; portal.style.display = ""; document.title = "Elliptic · Demo Library";
}
function route() {
  const m = location.hash.match(/^#\/(.+)$/);
  const app = m ? APPS.find(a => a.id === m[1]) : null;
  if (app) openApp(app); else closeApp();
}
document.getElementById("backBtn").addEventListener("click", () => { location.hash = ""; });
document.addEventListener("keydown", e => { if (e.key === "Escape" && viewer.classList.contains("open")) location.hash = ""; });
window.addEventListener("hashchange", route);

applyFilter();
route();

/* ---------- Quiet static starfield ---------- */
(function () {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  function draw() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + "px"; canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); ctx.clearRect(0, 0, w, h);
    const count = Math.round(Math.min(110, Math.max(36, (w * h) / 18000)));
    for (let i = 0; i < count; i++) {
      const x = Math.random() * w, y = Math.random() * h, r = Math.random() * 1.0 + 0.4, a = Math.random() * 0.3 + 0.1;
      ctx.beginPath(); ctx.fillStyle = "rgba(200,225,220," + a.toFixed(3) + ")";
      ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    }
  }
  draw();
  let t; window.addEventListener("resize", () => { clearTimeout(t); t = setTimeout(draw, 150); });
})();
</script>
</body>
</html>
